name: Publish Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (ignored if version is set)'
        required: false
        type: choice
        default: Patch
        options:
          - Patch
          - Minor
          - Major
      version:
        description: 'Exact version (e.g. 2.0.0) — overrides bump_type'
        required: false
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module platyPS -Scope CurrentUser -Force

      - name: Run publish script
        id: publish
        shell: pwsh
        run: |
          $SplatArgs = @{}
          $ExactVersion = '${{ inputs.version }}'.Trim()
          if ($ExactVersion) {
              $SplatArgs.Version = [version] $ExactVersion
          }
          else {
              $SplatArgs.BumpType = '${{ inputs.bump_type }}'
          }
          if ('${{ inputs.prerelease }}' -eq 'true') {
              $SplatArgs.Prerelease = $true
          }
          ./publish/publish.ps1 @SplatArgs

          $Psd1 = Import-PowerShellDataFile ./pwsh-prompt.psd1
          $Version = $Psd1.ModuleVersion
          "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Build release notes from commits
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- [\`%h\` | %an] **%s**%w(0,0,2)%n%b" HEAD)
          else
            LOG=$(git log --pretty=format:"- [\`%h\` | %an] **%s**%w(0,0,2)%n%b" "${PREV_TAG}..HEAD")
          fi

          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$LOG"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -B master origin/master
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Update wiki for v${{ steps.publish.outputs.version }}"
            git push origin master
          else
            echo "No wiki changes to push"
          fi

      - name: Publish to PowerShell Gallery
        shell: pwsh
        run: |
          $ModulePath = "./bin/Release/pwsh-prompt"
          Publish-Module -Path $ModulePath -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Verbose

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "[RELEASE] v${{ steps.publish.outputs.version }}"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.publish.outputs.version }}
          name: v${{ steps.publish.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          prerelease: ${{ inputs.prerelease }}
